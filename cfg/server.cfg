// Server identity
hostname "Gensokyo | TF2C + Vanilla Weapons | NYC"
sv_tags "touhou,kogasa,kogasatopia,custom,bant,whale"
sv_contact "malkuthbr2@pissmail.com"
sv_region 0 // -1 world, 0 US East, 1 US West, 2 SA, 3 EU, 4 Asia, 5 AU, 6 ME, 7 Africa
sv_visiblemaxplayers 26

// FastDL
sv_downloadurl "http://fastdl.kogasa.tf/tf2"

// filters
filters 0
redlist 0
filters_chat_frontend 1

// Class limits
restrict_enabled                 1
restrict_heavies                 1
restrict_immunity                0
restrict_snipers                 3
restrict_spies                   2
restrict_civilians               1


// Autobal
mp_autoteambalance 0
mp_teams_unbalance_limit 1

// Sentry gun nerfs
sm_cvar tf_sentrygun_damage 8
sm_cvar tf_sentrygun_mini_damage 4
sm_cvar tf_sentrygun_newtarget_dist 50

// Permissions
sv_allow_votes 0
sv_allow_point_servercommand always

// Misc
host_framerate 0
sv_steamgroup 45503416
sv_client_min_interp_ratio 1
sv_client_max_interp_ratio 2
sv_minrate 80000
sv_maxrate 0
sv_minupdaterate 66
sv_maxupdaterate 66
sv_mincmdrate 66
sv_maxcmdrate 66
sv_cacheencodedents 1
tf_resolve_stuck_players 0
host_timer_spin_ms 0
net_queued_packet_thread 1
net_maxcleartime 0.01
net_splitrate 500
sv_master_share_game_socket 1
lzma_persistent_buffer 1
mp_show_voice_icons 0

// Map and rounds
tf_flag_caps_per_round 9
mapcyclefile mapcycle.txt
mp_maxrounds 5
mp_timelimit 45
mp_bonusroundtime 0
mp_disable_respawn_times 0
mp_respawnwavetime 8
mp_chattime 2
mp_idledealmethod 0
mp_idlemaxtime 25

// Teams and voice
//mp_scrambleteams_auto 1
//mp_scrambleteams_auto_windifference 2 // Broken
sm_cvar tf_max_voice_speak_delay "-1"
sv_alltalk 1

// Movement
tf2c_autojump 1
tf2c_bunnyjump_max_speed_factor 1.10
tf2c_duckjump 1

// Gameplay tweaks
tf_allow_player_use 1
tf_avoidteammates_pushaway 0
tf_preround_push_from_damage_enable 1
tf_weapon_criticals_melee 2
tf2c_allow_special_classes 1 //Civ
decalfrequency 0.1
rspr_maxsprayscale 4
saysounds_force 0
sm_hugs_multiplier 2

// WhaleTracker
sm_whaletracker_public_ip "173.255.237.230"
sm_whaletracker_public_port 27015

// Bans
exec banned_user.cfg
exec banned_ip.cfg
writeid
writeip
